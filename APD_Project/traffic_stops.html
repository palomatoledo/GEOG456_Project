<html>
    <head>
        <title>APD Traffic Stops Since 2017</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
        <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
        <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
        <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
        <script src="./stops.js" ></script>
        <script src="./beats.js" ></script>

    </head>
    <body>

        <div id="titleBox">
            <h1>Asheville, NC Traffic Stops: 2018-2024</h1>
            <p>Adjust the slider (bottom left) to see month-by-month changes in traffic stops by police beat. Zoom in to see stop clusters, and click on any police beat for more detailed info.</p>
        </div>

        <div class="map-nav">
            <a href="scroll_map_searched.html">Stop points map</a>
            <a href="traffic_stops.html" class="active">Police beats map</a>
        </div>
    <div id="mapid"></div>

    <div id="sliderPanel">
        <div id="monthLabel"></div>
        <input type="range" id="monthSlider" min="0" max="86" value="0">
    </div>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: black;
            color: white;
            font-family: Arial, sans-serif;
        }

        #mapid {
            width: 100vw;
            height: 100vh;
        }
        
        .map-nav {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.75);
            padding: 8px;
            border-radius: 8px;
            display: flex;
            gap: 8px;
        }

        .map-nav a {
            color: white;
            text-decoration: none;
            background: #222;
            border: 1px solid #555;
            padding: 10px 16px;
            border-radius: 6px;
            font-family: Arial, sans-serif;
            font-size: 16px;
            display: block;
            text-align: center;
            min-width: 140px;
        }


        .map-nav a.active {
            background: white;
            color: black;
            border-color: white;
            pointer-events: none;
            cursor: default;
        }

        #sliderPanel {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.75);
            padding: 12px 14px;
            border-radius: 10px;
            width: 320px;
        }

        #monthLabel {
            color: white;
            font-size: 14px;
            margin-bottom: 8px;
        }

        #monthSlider {
            width: 100%;
        }

        #titleBox {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;

            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 16px 24px;
            border-radius: 12px;
            max-width: 600px;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        #titleBox h1 {
            margin: 0 0 6px 0;
            font-size: 1.8rem;
        }

        #titleBox p {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.4;
            color: #ddd;
        }

        .info.legend {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 12px;
            border-radius: 8px;
            line-height: 1.6;
            font-size: 13px;
        }

        .info {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .info.legend i {
            margin-right: 6px;
        }

        .custom-cluster div {
            box-shadow: 0 0 12px rgba(255,255,255,0.2);
        }


    </style>
    <script>

    const stopIcon = L.icon({
        iconUrl: 'black_marker_icon.png',
        iconSize: [28, 28],
        iconAnchor: [14, 28],
        popupAnchor: [0, -28]
    });

    // basemap layer
    var map = L.map('mapid', {
    center: [35.549793, -82.564742],
    zoom: 12,
    maxZoom: 18
});

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{
        subdomains: 'abcd',
        maxZoom: 20,
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    })
    .addTo(map);


    // law beats layer
    function getBeatColor(count) {
        return count > 52 ? '#7a0177' : //80-99th percentile
            count > 32 ? '#c51b8a' : //60-79th percentile
            count > 22 ? '#f768a1' : //40-57th percentile
            count > 13  ? '#fbb4b9' : //20-39th percentile
                            '#feebe2'; //0-19th percentile
    }


 var selectedMonth = "2026-01-01";

    function getFilteredBeats() {
    return {
        type: "FeatureCollection",
        features: beats.features.filter(function(feature) {
            return feature.properties.YYYY_MM === selectedMonth;
        })
    };
}

    function getFilteredStops() {
    return {
        type: "FeatureCollection",
        features: stops.features.filter(function(feature) {
            return feature.properties.YYYY_MM === selectedMonth;
        })
    };
}

    if (lawbeats) {
        map.removeLayer(lawbeats);
    }

    var lawbeats = L.geoJSON(getFilteredBeats(), {
        style: function(feature) {
            return {
                color: 'white',
                weight: 0.8,
                fillColor: getBeatColor(feature.properties.stop_count_beat_month),
                fillOpacity: 0.9
            };
        },
        onEachFeature: function(feature, layer) {
            layer.bindPopup(
                "Beat: " + feature.properties.beat + "<br>" +
                "Month: " + feature.properties.YYYY_MM + "<br>" +
                "Stops: " + feature.properties.stop_count_beat_month
            );
        }
    }).addTo(map);

    // var stopMarkers = L.markerClusterGroup({chunkedLoading: true });

    var stopMarkers = L.markerClusterGroup({
        iconCreateFunction: function(cluster) {
            var count = cluster.getChildCount();
            let color;
            if (count < 20) {
                color = "#ffe066";
            } else if (count < 50) {
                color = "#ffb703";
            } else if (count < 100) {
                color = "#fb8500";
            } else {
                color = "#ff4d00";
            }

            return L.divIcon({
                html: `<div style="
                background:${color};
                width:40px;
                height:40px;
                border-radius:50%;
                display:flex;
                align-items:center;
                justify-content:center;
                color:white;
                font-weight:bold;
                font-size:14px;
                border:2px solid rgba(255,255,255,0.2);
                ">${count}</div>`,
                className: "custom-cluster",
                iconSize: [40, 40]
            });
        }
    });

    map.addLayer(stopMarkers);

    var myGeoJSON = L.geoJSON(stops, {
        pointToLayer: function(feature, latlng) {
            return L.marker(latlng, { icon: stopIcon });
        },

    onEachFeature: function (feature, layer) {
        layer.bindPopup(
            "Race: " + feature.properties.name_race_2 + "<br>" +
            "Age: " + feature.properties.name_age_2
        );
    }});


    // slider

    var months = [
        "2017-10-01", "2017-11-01", "2017-12-01",
        "2018-01-01", "2018-02-01", "2018-03-01", "2018-04-01", "2018-05-01", "2018-06-01", "2018-07-01", "2018-08-01", "2018-09-01", "2018-10-01", "2018-11-01", "2018-12-01",
        "2019-01-01", "2019-02-01", "2019-03-01", "2019-04-01", "2019-05-01", "2019-06-01", "2019-07-01", "2019-08-01", "2019-09-01", "2019-10-01", "2019-11-01", "2019-12-01",
        "2020-01-01", "2020-02-01", "2020-03-01", "2020-04-01", "2020-05-01", "2020-06-01", "2020-07-01", "2020-08-01", "2020-09-01", "2020-10-01", "2020-11-01", "2020-12-01",
        "2021-01-01", "2021-02-01", "2021-03-01", "2021-04-01", "2021-05-01", "2021-06-01", "2021-07-01", "2021-08-01", "2021-09-01", "2021-10-01", "2021-11-01", "2021-12-01",
        "2022-01-01", "2022-02-01", "2022-03-01", "2022-04-01", "2022-05-01", "2022-06-01", "2022-07-01", "2022-08-01", "2022-09-01", "2022-10-01", "2022-11-01", "2022-12-01",
        "2023-01-01", "2023-02-01", "2023-03-01", "2023-04-01", "2023-05-01", "2023-06-01", "2023-07-01", "2023-08-01", "2023-09-01", "2023-10-01", "2023-11-01", "2023-12-01", 
        "2024-01-01", "2024-02-01", "2024-03-01", "2024-04-01", "2024-05-01", "2024-06-01", "2024-07-01", "2024-08-01", "2024-09-01", "2024-10-01", "2024-11-01", "2024-12-01"
    ];

    var slider = document.getElementById("monthSlider");
    var label = document.getElementById("monthLabel");

    // initial label
    label.innerHTML = months[0];

    // slider.addEventListener("input", function() {
    //     selectedMonth = months[this.value];
    //     label.innerHTML = selectedMonth;
    //     drawBeats();
    // });

    slider.addEventListener("input", function() {
        selectedMonth = months[this.value];
        const date = new Date(selectedMonth);
        label.innerHTML = date.toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'long'
        });
        updateMap();
    });

    // function moveSlider(value) {
    //     selectedMonth = value; // this changes the value of the selectedMonth variable
    //     map.removeLayer(lawbeats);// leaflet method to remove a layer / 
    //     lawbeats = L.geoJSON(getFilteredBeats());
    //     map.addLayer(lawbeats); // add the new layer
    //     document.getElementById('theMear').innerHTML = 'Month: '+ value
    // }
    // moveSlider('2026-01-01')

    // function drawBeats() {
    //     if (lawbeats) {
    //         map.removeLayer(lawbeats);
    //     }
        
    //     lawbeats = L.geoJSON(getFilteredBeats(), {
    //         style: function(feature) {
    //             return {
    //                 color: 'black',
    //                 weight: 1,
    //                 fillColor: getBeatColor(feature.properties.stop_count_beat_month),
    //                 fillOpacity: 0.6
    //             };
    //         },
    //         onEachFeature: function(feature, layer) {
    //             layer.bindPopup(
    //                 "Beat: " + feature.properties.beat + "<br>" +
    //                 "Month: " + feature.properties.YYYY_MM + "<br>" +
    //                 "Stops: " + feature.properties.stop_count_beat_month
    //             );
    //         }
    //     }).addTo(map);
    // }

    function updateMap() {
        // --- Update beats ---
        if (lawbeats) map.removeLayer(lawbeats);
        lawbeats = L.geoJSON(getFilteredBeats(), {
            style: function(feature) {
                return {
                    color: 'white',
                    weight: 1,
                    fillColor: getBeatColor(feature.properties.stop_count_beat_month),
                    fillOpacity: 0.7
                };
            },
            onEachFeature: function(feature, layer) {               
                const rawDate = feature.properties.YYYY_MM;
                const formattedDate = rawDate ? rawDate.slice(0, 7) : "N/A";
                layer.bindPopup(
                    "Beat: " + feature.properties.beat + "<br>" +
                    "Month: " + formattedDate + "<br>" +
                    "Stops: " + feature.properties.stop_count_beat_month
                );
            }
            
            
            // onEachFeature: function(feature, layer) {
            //     layer.bindPopup(
            //         "Beat: " + feature.properties.beat + "<br>" +
            //         "Month: " + feature.properties.YYYY_MM + "<br>" +
            //         "Stops: " + feature.properties.stop_count_beat_month
            //     );
            // }
        }).addTo(map);

        // --- Update stops ---
        stopMarkers.clearLayers(); // remove old stops
        var filteredStops = L.geoJSON(getFilteredStops(), {
            pointToLayer: function(feature, latlng) {
                return L.marker(latlng, { icon: stopIcon });
            },
            onEachFeature: function(feature, layer) {
                layer.bindPopup(
                    "Race: " + feature.properties.name_race_2 + "<br>" +
                    "Age: " + feature.properties.name_age_2
                );
            }
        });
        stopMarkers.addLayer(filteredStops);
    }

// create a leaflet legend
var legend = L.control({position: 'bottomright'});

legend.onAdd = function (map) {
    var div = L.DomUtil.create('div', 'info legend');

    // These should match your getBeatColor thresholds
    var grades = [0, 13, 22, 32, 52];

    // quantile: 13, 22, 32, 52
    // natural breaks: 20, 58, 101, 158

    for (var i = 0; i < grades.length; i++) {
        div.innerHTML +=
            '<i style="background:' + getBeatColor(grades[i] + 0.1) + '; width: 15px; height: 15px; display: inline-block;"></i> ' +
            grades[i] + (grades[i + 1] 
                ? '&ndash;' + grades[i + 1] + '<br>' 
                : '+');
    }

    return div;
};

legend.addTo(map);


// === LEGEND TITLE ===
var legendTitle = L.control({position: 'bottomright'});

legendTitle.onAdd = function (map) {
    this._div = L.DomUtil.create('div', 'info');
    this._div.innerHTML = '<h4>Stops per Beat</h4>';
    return this._div;
};

legendTitle.addTo(map);

    </script>
    </body>
</html>
