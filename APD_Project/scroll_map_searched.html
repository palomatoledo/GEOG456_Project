<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>APD Traffic Stops by Year</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    #map {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      z-index: 1;
    }

    #story {
      position: relative;
      z-index: 2;
      pointer-events: none;
    }

    .step {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 8vw;
    }

    .step-content {
      pointer-events: auto;
      max-width: 420px;
      background: rgba(0, 0, 0, 0.65);
      padding: 20px 24px;
      border-radius: 10px;
    }

    .step h2 {
      margin: 0 0 10px 0;
      font-size: 2rem;
    }

    .step p {
      margin: 0;
      line-height: 1.5;
      font-size: 1rem;
    }

    .year-label {
      position: fixed;
      top: 20px;
      left: 50px;
      z-index: 3;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .legend {
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.6;
      font-size: 13px;
    }

    .legend-title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .leaflet-container {
      background: black;
    }

    .toggle-box {
    position: fixed;
    top: 80px;
    left: 20px;
    z-index: 3;
    background: rgba(0,0,0,0.7);
    padding: 6px;
    border-radius: 8px;
    }

    .toggle-box button {
    background: #222;
    color: white;
    border: 1px solid #555;
    padding: 5px 10px;
    margin: 2px;
    cursor: pointer;
    border-radius: 5px;
    }

    .toggle-box button.active {
    background: white;
    color: black;
    }


  </style>
</head>
<body>
  <div id="map"></div>
  <div class="year-label" id="yearLabel">2018</div>
  
  <div class="toggle-box">
    <button id="allBtn" class="active">All stops</button>
    <button id="searchedBtn">Driver searched</button>
  </div>
    
  <div id="story">
    <section class="step" data-year="2018">
      <div class="step-content">
        <h1>2018</h1>
        <p>Traffic stops in Asheville, colored by recorded race. Scroll to move forward through the yearly patterns in traffic stops.</p>
      </div>
    </section>

    <section class="step" data-year="2019">
      <div class="step-content">
        <h1>2019</h1>
      </div>
    </section>

    <section class="step" data-year="2020">
      <div class="step-content">
        <h1>2020</h1>
      </div>
    </section>

    <section class="step" data-year="2021">
      <div class="step-content">
        <h1>2021</h1>
      </div>
    </section>

    <section class="step" data-year="2022">
      <div class="step-content">
        <h1>2022</h1>
      </div>
    </section>

    <section class="step" data-year="2023">
      <div class="step-content">
        <h1>2023</h1>
      </div>
    </section>

    <section class="step" data-year="2024">
      <div class="step-content">
        <h1>2024</h1>
      </div>
    </section>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    let currentMode = "all";
    let lastLoadedMode = null;
    let currentLayer = null;
    let currentYear = null;
    let activeFadeInterval = null;
    let loadToken = 0;



    const map = L.map('map', {
      zoomControl: true,
      attributionControl: false,
      scrollWheelZoom: false
    }).setView([35.549793, -82.564742], 12);

    L.tileLayer(
      'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
      {
        subdomains: 'abcd',
        maxZoom: 20
      }
    ).addTo(map);

    const yearLabel = document.getElementById('yearLabel');

    const loadedData = {};

    function getRaceColor(race) {race = String(race || "").trim().toUpperCase();
      return race === "W" ? "#e665bf" :
      race === "B" ? "#a9d92f" :
      race === "I" ? "#774bdc" :
      race === "A" ? "#5abee9" :
      race === "U" ? "#d15c2d" :
      "#cccccc";
    }

    function raceLabel(race) {race = String(race || "").trim().toUpperCase();
      return race === "W" ? "White" :
      race === "B" ? "Black" :
      race === "I" ? "Indian" :
      race === "A" ? "Asian" :
      race === "U" ? "Unknown" :
      "Other";
    }

    function stylePoint(feature, latlng, opacity = 1) {
        const race = feature.properties.name_race_2;
        const color = getRaceColor(race);
        
        return L.circleMarker(latlng, {
            radius: 1,
            fillColor: color,
            color: color,
            weight: 0,
            fillOpacity: opacity,
            opacity: opacity
        });
    }

    function onEachFeature(feature, layer) {
      const props = feature.properties;
      layer.bindPopup(
        "<strong>Race:</strong> " + (props.name_race_2 || "NA") + "<br>" +
        "<strong>Date:</strong> " + (props.YYYY_MM || "NA")
      );
    }

    function setLayerOpacity(layer, opacity) {
      layer.eachLayer(function(marker) {
        if (marker.setStyle) {
          marker.setStyle({
            fillOpacity: opacity,
            opacity: opacity
          });
        }
      });
    }

async function loadYear(year) {
  if (currentYear === year && currentLayer && currentMode === lastLoadedMode) return;

  yearLabel.textContent = year;
  currentYear = year;

  try {
    let data;
    const cacheKey = `${currentMode}_${year}`;
    const fileName = currentMode === "searched"
      ? `searched_${year}.geojson`
      : `jittered_${year}.geojson`;

    console.log("Loading file:", fileName);

    if (loadedData[cacheKey]) {
      data = loadedData[cacheKey];
    } else {
      const response = await fetch(fileName);
      if (!response.ok) {
        throw new Error(`Could not load ${fileName}`);
      }
      data = await response.json();
      loadedData[cacheKey] = data;
    }

    console.log("Feature count:", data.features.length);

    if (currentLayer) {
      map.removeLayer(currentLayer);
    }

    currentLayer = L.geoJSON(data, {
      pointToLayer: function(feature, latlng) {
        return stylePoint(feature, latlng, 1);
      },
      onEachFeature: onEachFeature
    }).addTo(map);

    lastLoadedMode = currentMode;

  } catch (error) {
    console.error(error);
  }
}

const legend = L.control({ position: 'bottomright' });

legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');

  const races = ['W', 'B', 'I', 'A', 'U'];

  let html = '<div class="legend-title">Race</div>';

  races.forEach(code => {
    html += `
      <div class="legend-item">
        <span class="legend-color" style="background:${getRaceColor(code)};"></span>
        <span>${raceLabel(code)}</span>
      </div>
    `;
  });

  div.innerHTML = html;
  return div;
};

legend.addTo(map);

    const steps = document.querySelectorAll('.step');

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const year = entry.target.dataset.year;
            loadYear(year);
          }
        });
      },
      {
        threshold: 0.55
      }
    );

    steps.forEach(step => observer.observe(step));

    loadYear('2018');


    const allBtn = document.getElementById("allBtn");
    const searchedBtn = document.getElementById("searchedBtn");
    
    function updateButtons() {
        allBtn.classList.toggle("active", currentMode === "all");
        searchedBtn.classList.toggle("active", currentMode === "searched");
    }
    
    allBtn.onclick = () => {
        if (currentMode !== "all") {
            currentMode = "all";
            updateButtons();
            loadYear(currentYear);
        }
    };
    
    searchedBtn.onclick = () => {
        if (currentMode !== "searched") {
            currentMode = "searched";
            updateButtons();
            loadYear(currentYear);
        }
    };
  </script>
</body>
</html>
